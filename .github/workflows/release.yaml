name: Release
on:
  workflow_dispatch:
defaults:
  run:
    shell: nix run --file . devShells.ci-essentials -- bash {0}
jobs:
  make-assets:
    strategy:
      matrix:
        os:
          - ubuntu-24.04 # renovate: github-runner
          - macos-15-intel # renovate: github-runner
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Make Assets
        id: make-assets
        run: mise run ci:make-assets
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: assets-${{ matrix.os }}
          path: ${{ steps.make-assets.outputs.asset-directory }}
      - if: always()
        uses: ./.github/actions/save-cache
  release:
    needs: make-assets
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: assets-*
          merge-multiple: true
          # The destination
          path: assets
      - name: Make release
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: mise run ci:release
      - if: always()
        uses: ./.github/actions/save-cache
