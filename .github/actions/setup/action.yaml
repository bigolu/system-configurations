name: Setup
description: Set up Nix
runs:
  using: "composite"
  steps:
    - uses: canidae-solutions/lix-quick-install-action@cdb5d0931be2223edbb9bad884341fcacdac298f # v4
      with:
        lix_conf: |
          show-trace = true
          # This way, if we fail to build something, we can make its derivation a GC
          # root and the derivation's dependencies won't get garbage collected. Since
          # they won't get garbage collected, they'll be cached and we won't lose our
          # build progress.
          #
          # There's an issue[1] for automating the creation of the derivation GC root.
          #
          # [1]: https://github.com/NixOS/nix/issues/7561
          keep-outputs = true
          # This will save a lot of space since we also enabled `keep-outputs`.
          keep-derivations = false
    - uses: nix-community/cache-nix-action/restore@7df957e333c1e5da7721f60227dbba6d06080569 # v7
      with:
        # SYNC: cache-settings-nix
        #
        # We don't know what suffix the key will have so we'll never get a primary
        # key match.
        primary-key: will-not-match
        restore-prefixes-first-match: nix-${{ github.ref_name }}-${{ github.workflow }}-${{ github.job }}-${{ runner.arch }}-${{ runner.os }}-
        paths: |
          ~/.cache/gc-roots
    # TODO: When the action above restores the cache, the folders it creates are
    # owned by the root user. I think this is because they extract the cache
    # from its tar archive using sudo[1]. I should open an issue.
    #
    # [1]: https://github.com/nix-community/cache-nix-action/blob/a100bc2d2b42a2556e7205eb0025f6807e752d4d/src/utils/action.ts#L111
    - name: Give the current user write access to the cache
      shell: bash
      run: sudo chmod -R u+w ~/.cache
