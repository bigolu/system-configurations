# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/master/schema.json

no_auto_install: true
glob_matcher: doublestar

# TODO: The default colors have bad contrast.
colors:
  cyan: 6
  gray: 8
  green: 2
  red: 1
  yellow: 3

output:
  - execution_info

templates:
  # Use `|-` so words put next to this template are put on same line as the last line
  # in this template, making them arguments to the function call.
  run_in_dev_shell: |-
    run_in_dev_shell() {
      # When `git-auto-sync` runs, some of the sync jobs may depend on something
      # from the new nix dev shell.
      if [ -n "${GIT_AUTO_SYNC_LAST_COMMIT:-}" ]; then
        nix run --file . outputsForCurrentSystem.devShells.dev -- "$@"
      else
        "$@"
      fi
    }
    run_in_dev_shell
  # Sometimes, I want to see the output of a job in real time.
  #
  # I can't use the `follow` option for these reasons:
  #   - It can only be set for an entire hook, not individual jobs.
  #   - Even if it could be set on a job, it only works if you have
  #     `execution_out` enabled in the `output` option, which I don't.
  #
  # Instead, I use this template to redirect stdout/stderr to the terminal.
  #
  # For this to work, either the `interactive` or `use_stdin` option must be
  # enabled. This is needed since enabling either of those options will make
  # lefthook connect the job to the terminal, instead of the PTY that it uses by
  # default.
  connect_to_terminal: |
    # Ensure it's writable.
    #
    # We use `printf` instead of `:` because `:` is a "special" builtin and when
    # a special builtin fails, the script exits[1].
    #
    # [1]: https://pubs.opengroup.org/onlinepubs/009604499/utilities/xcu_chap02.html#tag_02_08_01
    if printf "" >/dev/tty; then
      exec >/dev/tty 2>&1
    fi

sync:
  # Set `files` to ensure that `glob`s are used[1].
  #
  # [1]: https://lefthook.dev/configuration/glob/
  files: |
    set -eu
    if [ -n "${GIT_AUTO_SYNC_LAST_COMMIT:-}" ]; then
      git diff --name-only "$GIT_AUTO_SYNC_LAST_COMMIT" HEAD
    else
      git ls-files
    fi
  jobs:
    - name: direnv
      glob:
        - lefthook.yaml
        - .envrc-recommended.bash
        # Everything below affects the nix dev shell, which direnv loads
        - "**/*.nix"
        - flake.lock
        - "{nix,mise/tasks}/**/*"
      # `{connect_to_terminal}` requires `interactive` or `use_stdin`.
      interactive: true
      # I use `{connect_to_terminal}` so I can see which nix builds are the
      # slowest and why.
      run: |
        {connect_to_terminal}
        direnv reload
        direnv exec . true
    - group:
        parallel: true
        jobs:
          - name: system
            glob:
              - lefthook.yaml
              - "{nix,program-configs}/**/*"
              - "**/*.nix"
              - flake.lock
            # `{connect_to_terminal}` requires `interactive` or `use_stdin`.
            #
            # I also want to take input from the user for these reasons:
            #   - So I can input my password for `sudo`, used in the
            #     `lefthook:system-sync` mise task.
            #   - If the `--ask` flag is passed to the `sync` mise task, then
            #     `lefthook:system-sync` will prompt the user for confirmation.
            interactive: true
            # I use `{connect_to_terminal}` so I can see which nix builds are the
            # slowest and why.
            run: "{connect_to_terminal} {run_in_dev_shell} mise run lefthook:system-sync"
          - name: git-auto-sync
            glob:
              - lefthook.yaml
              - "**/*.nix"
              - flake.lock
            run: "{run_in_dev_shell} git-auto-sync install lefthook run sync"
          - name: git-auto-check
            glob:
              - lefthook.yaml
              - "**/*.nix"
              - flake.lock
            run: "{run_in_dev_shell} git-auto-check install lefthook run check"

check:
  # Set `files` to ensure that `glob`s are used[1].
  #
  # [1]: https://lefthook.dev/configuration/glob/
  files: git ls-files
  exclude:
    - ".vscode/ltex*"
    - program-configs/keyboard/US keyboard - no accent keys.bundle/**/*
    - docs/**/*
    - nix/pins/npins/**/*
  # I want to fail fast[1] for these reasons:
  #   - During local development, this is useful when there are issues found by
  #     fast checks, but now slow ones. Without failing fast, you would have to
  #     wait for all checks to finish only to find an issue with a fast check
  #     and then have to run them all again once the issue is fixed.
  #   - In CI, you don't have to waste time and money running slow checks if a
  #     fast one has already failed.
  #
  # Since lefthook doesn't have this option, I instead put the checks in groups,
  # from fastest to slowest, and use `piped`.
  #
  # [1]: https://hk.jdx.dev/configuration.html#fail-fast
  piped: true
  # Ensure our pre-push hook fails, and the push gets aborted, if any files get fixed.
  fail_on_changes: always
  jobs:
    # Why fixers should run before other checks:
    #   - A fixer could produce code that would fail another check
    #   - A fixer could fix an issue that would have been found by another check
    - name: fix
      group:
        jobs:
          - name: flake-lock
            glob: flake.nix
            run: nix flake lock
          - name: readme-config-names
            glob: "**/*.nix"
            run: mise run lefthook:add-config-names-to-readme
          - name: task-docs
            glob: mise/**/*
            run: mise generate task-docs --style detailed --output docs/tasks.md
          - name: deadnix
            glob: "**/*.nix"
            run: deadnix --quiet --edit {files}
          - name: statix-fix
            glob: "**/*.nix"
            run: for file in {files}; do statix fix "$file"; done
          - name: markdownlint-cli2
            glob: "**/*.md"
            run: markdownlint-cli2 --fix {files}
          - name: npins
            glob: flake.lock
            run: npins upgrade
          - name: shellcheck-fix
            glob: "**/*.{sh,bash}"
            run: |
              set -eu
              set +e
              patch="$(shellcheck --format diff {files})"
              exit_code=$?
              set -e
              # shellcheck exits with 0 if it does not find any issues and 1 if it
              # does. Any other exit code should be considered a failure.
              if [ "$exit_code" -gt 1 ]; then
                exit 1
              fi
              echo "$patch" | git apply --allow-empty
          # Only use the quotation marks recognized by programming languages.
          - name: quotes
            run: sd '[\uFF07\u2018\u2019\u201B]' "'" {files} && sd '[\uFF02\u201C\u201D\u201F]' '"' {files}

          # Formatters
          # -------------------------------------------------------------------
          # Formatters should run after the other fixes since some fixes may produce
          # code that doesn't comply with the formatting.

          - name: taplo-fix
            glob: "**/*.toml"
            run: taplo format {files}
          # This also acts a syntax checker for these file types since prettier
          # will fail if the files aren't syntactically correct.
          - name: prettier
            glob: "**/*.{md,json,jsonc,yaml}"
            run: |
              prettier \
                --cache \
                --cache-location "$PRJ_DATA_DIR/prettier-cache" \
                --cache-strategy metadata \
                --list-different \
                --write \
                {files}
          - name: shfmt
            glob: "**/*.{sh,bash}"
            run: shfmt --write {files}
          - name: fish_indent
            glob: "**/*.fish"
            run: fish_indent --write {files}
          - name: nixfmt
            glob: "**/*.nix"
            run: nixfmt --strict --verify {files}
          - name: stylua
            glob: "**/*.lua"
            run: stylua --verify {files}
    - group:
        parallel: true
        jobs:
          - name: fish
            glob: "**/*.fish"
            run: for file in {files}; do fish --no-execute "$file"; done
          - name: shellcheck-lint
            glob: "**/*.{sh,bash}"
            run: shellcheck {files}
          - name: actionlint
            glob: ".github/workflows/*.yaml"
            run: actionlint {files}
          - name: statix-lint
            glob: "**/*.nix"
            run: for file in {files}; do statix check "$file"; done
          - name: nixpkgs-lint
            glob: "**/*.nix"
            run: nixpkgs-lint --include-unfinished-lints -- {files}
          - name: editorconfig-checker
            run: editorconfig-checker {files}
          - name: renovate-config-validator
            glob: renovate.json
            run: renovate-config-validator --no-global --strict {files}
          - name: lua-ls
            run: |
              # --configpath is relative to the directory being checked so I'm
              # using an absolute path instead.
              lua-language-server \
                --logpath "$(mktemp --directory)/lua-ls-logs" \
                --check ./program-configs/neovim \
                --configpath "$PWD/.luarc.json"
          - name: keyd
            only:
              - run: command -v keyd
            glob: "**/keyd/default.conf"
            run: keyd check {files}
          - name: taplo-lint
            glob: "**/*.toml"
            run: taplo lint {files}
    - name: nix
      # `{connect_to_terminal}` requires `interactive` or `use_stdin`.
      interactive: true
      # I use `{connect_to_terminal}` so I can see which nix builds are the
      # slowest and why.
      run: |
        {connect_to_terminal}
        set -eu
        dest="$PRJ_DATA_DIR/gc-roots/checks"
        rm -rf "$dest"
        nix build \
          --out-link "$dest/root" \
          --impure \
          --expr "builtins.removeAttrs (import ./.).outputsForCurrentSystem.checks [\"pkgs-shell-bundle\"]"
