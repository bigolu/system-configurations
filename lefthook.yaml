# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/master/schema.json

no_auto_install: true
glob_matcher: doublestar

# TODO: The default colors have bad contrast. There's an issue for changing them[1].
#
# [1]: https://github.com/evilmartians/lefthook/issues/1404
colors:
  cyan: 6
  gray: 8
  green: 2
  red: 1
  yellow: 3

output:
  - execution_info

templates:
  # When `git-auto-sync` runs, some of the sync jobs may depend on something from the new
  # nix dev shell.
  #
  # Use `|-` so words put next to this template are put on same line as the last line
  # in this template, making them arguments to the function call.
  run_in_dev_shell: |-
    run_in_dev_shell() {
      if [ -n "${GIT_AUTO_SYNC_LAST_COMMIT:-}" ]; then
        nix run --file nix/flake-compat.nix outputsForCurrentSystem.devShells.dev -- "$@"
      else
        "$@"
      fi
    }
    run_in_dev_shell

# Git Hooks
# -----------------------------------------------------------------------------------
# Do not specify globs for any jobs that belong to a git hook because they won't be
# applied unless their run command uses `{files}`. You could get around this by
# adding something like `: {files};` to the beginning of every run command, but that
# would lead to a subtle bug if you ever forgot to add it. For custom hooks, I get
# around this by always specifying a `files` command at the hook level since the
# documentation[1] states that globs will always be applied if a `files` command is
# used. This does not seem to apply to git hooks though and I think that's a bug so I
# should report it. There was a pull request for always applying globs, but it was
# closed[2].
#
# [1]: https://lefthook.dev/configuration/glob/
# [2]: https://github.com/evilmartians/lefthook/pull/595

pre-push:
  jobs:
    - name: check
      interactive: true
      run: |
        set -eu
        before="$(git rev-parse HEAD)"
        # Run an interactive rebase to check the commits that haven't been
        # pushed yet.
        #
        # Stop the sequence editor from launching by setting it to a no-op.
        #
        # TODO: Despite me enabling `interactive`, this script doesn't get
        # connected to /dev/tty so I have to do it with manual redirections.
        git \
          -c sequence.editor=: \
          rebase \
          --interactive \
          --exec 'mise run check' \
          "$(git merge-base '@{push}' HEAD)" </dev/tty >/dev/tty 2>&1
        after="$(git rev-parse HEAD)"
        # A commit was changed so abort the push by exiting with a non-zero code.
        if [ "$before" != "$after" ]; then
          exit 1
        fi

post-rewrite:
  jobs:
    - name: sync
      # Some of the jobs in the `sync` group have `interactive` enabled so it needs
      # to be enabled here as well.
      interactive: true
      run: GIT_AUTO_SYNC_HOOK_NAME='post-rewrite' git-auto-sync {0} -- lefthook run sync

post-merge:
  jobs:
    - name: sync
      # Some of the jobs in the `sync` group have `interactive` enabled so it needs
      # to be enabled here as well.
      interactive: true
      run: GIT_AUTO_SYNC_HOOK_NAME='post-merge' git-auto-sync {0} -- lefthook run sync

post-checkout:
  jobs:
    - name: sync
      # Some of the jobs in the `sync` group have `interactive` enabled so it needs
      # to be enabled here as well.
      interactive: true
      run: GIT_AUTO_SYNC_HOOK_NAME='post-checkout' git-auto-sync {0} -- lefthook run sync

post-commit:
  jobs:
    - name: sync
      run: GIT_AUTO_SYNC_HOOK_NAME='post-commit' git-auto-sync

# Custom Hooks
# -----------------------------------------------------------------------------------
# Lefthook only applies a job's glob if it, or the hook it belongs to, has a 'files'
# command or you use the {files} placeholder in the run command[1]. Some of the run
# commands below don't use {files} so to ensure that globs are always applied, I add
# a 'files' command to the hook. There was a pull request for always applying globs,
# but it was closed[2].
#
# [1]: https://lefthook.dev/configuration/glob/
# [2]: https://github.com/evilmartians/lefthook/pull/595

sync:
  # Custom hooks should always have a files command. See the comment below the
  # "Custom Hooks" heading for why that is.
  files: |
    set -eu
    if [ -n "${GIT_AUTO_SYNC_LAST_COMMIT:-}" ]; then
      git diff --name-only "$GIT_AUTO_SYNC_LAST_COMMIT" HEAD
    else
      git ls-files
    fi
  jobs:
    - name: direnv
      # - This job can take a while so being able to see the output in real time
      #   could reveal bottlenecks.
      # - If I can see the output in real time, I can spot accidental nix cache
      #   misses and cancel the job instead of waiting for nix to rebuild the
      #   package.
      interactive: true
      glob:
        - lefthook.yaml
        - .envrc-recommended.bash
        - "direnv/**/*"
        # Everything below affects the nix dev shell, which direnv loads
        - "**/*.nix"
        - flake.lock
        - "{nix,mise/tasks}/**/*"
      run: |
        direnv reload
        direnv exec . true
    - name: system
      glob:
        - lefthook.yaml
        - "{nix,smart_plug,dotfiles}/**/*"
        - "**/*.nix"
        - flake.lock
      # - So I can input my password for `sudo`
      # - This job can take a while so being able to see the output in real time
      #   could reveal bottlenecks.
      # - If I can see the output in real time, I can spot accidental nix cache
      #   misses and cancel the job instead of waiting for nix to rebuild the
      #   package.
      # - If the `--ask` flag is passed to the mise `sync` task, then
      #   `lefthook:system-sync` will prompt the user for confirmation.
      interactive: true
      run: "{run_in_dev_shell} mise run lefthook:system-sync"
    - name: fish
      glob:
        - lefthook.yaml
        - dotfiles/fish/conf.d/*.fish
      run: "{run_in_dev_shell} fish -c fish-reload"
    - name: lefthook
      skip:
        - run: lefthook check-install
      run: "{run_in_dev_shell} lefthook install --force"

check:
  # Custom hooks should always have a files command. See the comment below the
  # "Custom Hooks" heading for why that is.
  #
  # Files in the HEAD commit
  files: git log --format='' --name-only --diff-filter=ACMR 'HEAD^!'
  exclude:
    - ".vscode/ltex*"
    - dotfiles/keyboard/US keyboard - no accent keys.bundle/**/*
    - docs/**/*
  # Enabling `piped` is useful during local development when there are issues
  # found by fast checks, but not slow ones. Without `piped`, you would run all
  # the checks only to find an issue with a fast check and then have to run all
  # the checks again once that issue is fixed. With `piped`, the slow ones won't
  # run since an issue was found by one of the faster ones. Once you fix the
  # issue found by the fast check, then the slower ones will run. However, this
  # means you'll have to resolve issues one check at a time instead of resolving
  # them at all at once. To mitigate this, some of the checks are put in groups.
  # Using groups also allows you run the checks within that group in parallel.
  #
  # This is also useful for CI since you wouldn't want to waste time and money
  # running slow checks if a fast one has already failed.
  piped: true
  jobs:
    - name: commit
      files: |
        set -eu
        file="$(git rev-parse --git-dir)/lefthook-commit-message.txt"
        git log --format=%B --max-count 1 HEAD >"$file"
        echo "$file"
      group:
        jobs:
          - name: typos
            run: typos --no-check-filenames {files}
    # Why fixers should run before other checks:
    #   - A fixer could produce code that would fail another check
    #   - A fixer could fix an issue that would have been found by another check
    - name: fix
      group:
        jobs:
          - name: flake-lock
            glob: flake.nix
            run: nix flake lock
          - name: readme-config-names
            glob: "**/*.nix"
            exclude:
              - nix/pins/npins/**/*
            run: mise run lefthook:add-config-names-to-readme
          - name: task-docs
            glob: mise/**/*
            # TODO: markdown2html-converter hasn't been updated in a couple years.
            # I'd like to switch to markdown-to-html-cli[1], but it isn't in nixpkgs.
            # Maybe I can add it or make a request.
            #
            # [1]: https://github.com/jaywcjlove/markdown-to-html-cli
            run: |
              set -eu
              markdown="$(mktemp --directory)/temp.md"
              html="docs/tasks.html"
              mise generate task-docs --style detailed --output "$markdown"
              markdown2html-converter \
                --no-cjk-fonts \
                --force \
                --title "Tasks" \
                --html-path "$html" \
                "$markdown"
              # Format the HTML so it is easier to review changes to it.
              #
              # I could also let the "prettier" job further down format this file,
              # but this would cause a problem: markdown2html-converter always
              # regenerates the HTML, even if the task documentation is up to date.
              # Since the format of the HTML from markdown2html-converter does not
              # match the format that prettier would use, this task would always fail
              # since it would always make a change.
              prettier --list-different --write "$html"
          - name: deadnix
            glob: "**/*.nix"
            exclude:
              - nix/pins/npins/**/*
            run: deadnix --quiet --edit {files}
          - name: statix-fix
            glob: "**/*.nix"
            exclude:
              - nix/pins/npins/**/*
              # I want to ignore a fix in this file, but statix doesn't support
              # ignoring fixes with comments[1] so I'll skip the whole file.
              #
              # [1]: https://github.com/oppiliappan/statix/issues/61
              - nix/overlays/nixpkgs.nix
            # statix doesn't support passing multiple files yet:
            # https://github.com/oppiliappan/statix/issues/69
            run: parallel statix fix -- {files}
          - name: markdownlint-cli2
            glob: "**/*.md"
            run: markdownlint-cli2 --fix {files}
          - name: npins
            glob:
              - flake.lock
              - nix/pins/npins/**/*
            run: npins upgrade
          - name: shellcheck-fix
            glob: "**/*.{sh,bash}"
            run: |
              bash -eu -o pipefail -c '
                {
                  set +o errexit
                  shellcheck --format diff "$@"
                  exit_code=$?
                  set -o errexit
                  # shellcheck exits with 0 if it does not find any issues and 1 if it
                  # does. Any other exit code should be considered a failure.
                  if (( exit_code > 1 )); then
                    exit 1
                  fi
                } |
                  git apply --allow-empty
              ' -- {files}

          # Formatters
          # -------------------------------------------------------------------
          # Formatters should run after the other fixes since some fixes may produce
          # code that doesn't comply with the formatting.

          - name: taplo-fix
            glob: "**/*.toml"
            run: taplo format {files}
          # This also acts a syntax checker for these file types since prettier
          # will fail if the files aren't syntactically correct.
          - name: prettier
            glob: "**/*.{md,json,jsonc,yaml}"
            exclude:
              - nix/pins/npins/**/*
            run: |
              prettier \
                --cache \
                --cache-location "$PRJ_DATA_DIR/prettier-cache" \
                --cache-strategy metadata \
                --list-different \
                --write \
                {files}
          - name: shfmt
            glob: "**/*.{sh,bash}"
            run: shfmt --write {files}
          - name: fish_indent
            glob: "**/*.fish"
            run: fish_indent --write {files}
          - name: nixfmt
            glob: "**/*.nix"
            exclude:
              - nix/pins/npins/**/*
            run: nixfmt --verify {files}
          - name: stylua
            glob: "**/*.lua"
            run: stylua --verify {files}
    - name: lint
      group:
        parallel: true
        jobs:
          - name: fish
            glob: "**/*.fish"
            # TODO: Fish doesn't support passing multiple files, I should open an
            # issue.
            run: parallel fish --no-execute -- {files}
          - name: shellcheck-lint
            glob: "**/*.{sh,bash}"
            run: shellcheck {files}
          - name: actionlint
            glob: ".github/workflows/*.yaml"
            run: actionlint {files}
          - name: statix-lint
            glob: "**/*.nix"
            exclude:
              - nix/pins/npins/**/*
              # I want to ignore a fix in this file, but statix doesn't support
              # ignoring fixes with comments[1] so I'll skip the whole file.
              #
              # [1]: https://github.com/oppiliappan/statix/issues/61
              - nix/overlays/nixpkgs.nix
            # statix doesn't support passing multiple files yet:
            # https://github.com/oppiliappan/statix/issues/69
            run: parallel statix check -- {files}
          - name: nixpkgs-lint
            glob: "**/*.nix"
            exclude:
              - nix/pins/npins/**/*
            run: nixpkgs-lint --include-unfinished-lints -- {files}
          - name: typos
            run: typos {files}
          - name: editorconfig-checker
            run: editorconfig-checker {files}
          - name: renovate-config-validator
            glob:
              - renovate.json
            run: renovate-config-validator --no-global --strict {files}
          - name: lua-ls
            glob: dotfiles/neovim/**/*.lua
            run: |
              # --configpath is relative to the directory being checked so I'm
              # using an absolute path instead.
              lua-language-server \
                --logpath "$(mktemp --directory)/lua-ls-logs" \
                --check ./dotfiles/neovim \
                --configpath "$PWD/.luarc.json"
          - name: keyd
            only:
              - run: command -v keyd
            glob: "**/keyd/default.conf"
            run: keyd check {files}
          - name: taplo-lint
            glob: "**/*.toml"
            run: taplo lint {files}
    - name: nix
      # Why `interactive` is enabled:
      #   - This job can take a while so being able to see the output in real
      #     time could reveal bottlenecks.
      #   - If I can see the output in real time, I can spot accidental nix
      #     cache misses and cancel the job instead of waiting for nix to
      #     rebuild the package.
      interactive: true
      glob:
        - "**/*.nix"
        - flake.lock
        - nix/**/*
        - dotfiles/**/*
      run: |
        bash -eu -o pipefail -c '
          dest="$PRJ_DATA_DIR/gc-roots/checks"
          rm -rf "$dest"
          nix build \
            --out-link "$dest/root" \
            --impure \
            --expr "builtins.removeAttrs (import nix/flake-compat.nix).outputsForCurrentSystem.checks [\"pkgs-shell-bundle\"]"
        '
