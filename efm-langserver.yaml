# yaml-language-server: $schema=https://raw.githubusercontent.com/mattn/efm-langserver/master/schema.json

version: 2

lint-debounce: 200ms

tools:
  taplo: &taplo
    format-stdin: true
    format-command: taplo format --stdin-filepath ${INPUT} -
  prettier: &prettier
    format-stdin: true
    format-command: |
      # The outer and inner case statements represent include and exclude globs
      # respectively.
      case ${INPUT} in
        *)
          case ${INPUT} in
            */npins/* | */.vscode/*.json)
              cat
              ;;
            *)
              prettier --stdin-filepath ${INPUT}
              ;;
          esac
          ;;
      esac
  shfmt: &shfmt
    format-stdin: true
    format-command: shfmt --filename ${INPUT} -
  fish_indent: &fish_indent
    format-stdin: true
    format-command: fish_indent
  nixfmt: &nixfmt
    format-stdin: true
    format-command: |
      # The outer and inner case statements represent include and exclude globs
      # respectively.
      case ${INPUT} in
        *)
          case ${INPUT} in
            */npins/*)
              cat
              ;;
            *)
              nixfmt --verify --filename ${INPUT}
              ;;
          esac
          ;;
      esac
  stylua: &stylua
    format-stdin: true
    format-command: stylua --verify --stdin-filepath ${INPUT} -
  markdownlint-cli2: &markdownlint-cli2
    lint-source: markdownlint-cli2
    lint-after-open: true
    lint-stdin: true
    lint-command: markdownlint-cli2 -
    lint-formats:
      - "%f:%l:%c %m"
      - "%f:%l %m"
  statix: &statix
    lint-source: statix
    lint-after-open: true
    lint-stdin: true
    lint-command: |
      # The outer and inner case statements represent include and exclude globs
      # respectively.
      case ${INPUT} in
        *)
          case ${INPUT} in
            */npins/*)
              :
              ;;
            *)
              statix check --stdin --format errfmt
              ;;
          esac
          ;;
      esac
    lint-formats:
      - "%f>%l:%c:%t:%n:%m"
  nixpkgs-lint: &nixpkgs-lint
    lint-source: nixpkgs-lint
    lint-after-open: true
    lint-stdin: true
    lint-ignore-exit-code: true
    # dependencies: cat, mktemp, jq
    lint-command: |
      # The outer and inner case statements represent include and exclude globs
      # respectively.
      case ${INPUT} in
        *)
          case ${INPUT} in
            */npins/*)
              :
              ;;
            *)
              input=${INPUT}
              basename="${input##*/}"
              extension=".${basename##*.}"
              temp="$(mktemp --suffix "$extension")"
              cat >"$temp"
              nixpkgs-lint --include-unfinished-lints --format json -- "$temp" |
                jq \
                  --raw-output \
                  --arg input "$input" \
                  '.[] | "\($input):\(.line):\(.column): \(.message)"'
              ;;
          esac
          ;;
      esac
    lint-formats:
      - "%f:%l:%c: %m"
  editorconfig-checker: &editorconfig-checker
    lint-source: editorconfig-checker
    lint-after-open: true
    lint-stdin: false
    lint-on-save: true
    lint-command: editorconfig-checker -no-color -format gcc ${INPUT}
    lint-formats:
      - "%f:%l:%c: %m"
  keyd: &keyd
    lint-source: keyd
    lint-after-open: true
    lint-stdin: true
    lint-command: |
      # Linux only
      if ! type -P keyd >/dev/null; then
        exit 0
      fi

      # The outer and inner case statements represent include and exclude globs
      # respectively.
      case ${INPUT} in
        */keyd/default.conf)
          case ${INPUT} in
            *)
              keyd check /dev/stdin
              ;;
          esac
          ;;
      esac
    lint-formats:
      - "%.%#: %.%#:%l: %m"
      - "%.%#: %m"

languages:
  toml:
    - <<: *taplo
  markdown:
    - <<: *prettier
    - <<: *markdownlint-cli2
  json:
    - <<: *prettier
  jsonc:
    - <<: *prettier
  yaml:
    - <<: *prettier
  shellscript:
    - <<: *shfmt
  fish:
    - <<: *fish_indent
  nix:
    - <<: *nixfmt
    - <<: *statix
    - <<: *nixpkgs-lint
  lua:
    - <<: *stylua
  properties:
    - <<: *keyd
  =:
    - <<: *editorconfig-checker
